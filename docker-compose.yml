version: '3.8'

services:
  # Core Blockchain Node
  blockchain-node:
    build:
      context: .
      dockerfile: core/blockchain/Dockerfile
    ports:
      - "8080:8080"
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
    environment:
      - NETWORK_ID=isa-chain-testnet
      - CHAIN_ID=15489
      - NODE_ENV=development
    volumes:
      - blockchain_data:/app/data
    networks:
      - isa-chain-network

  # Database Services
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: isachain
      POSTGRES_USER: isachain
      POSTGRES_PASSWORD: isachain123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isa-chain-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - isa-chain-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: isachain
      MONGO_INITDB_ROOT_PASSWORD: isachain123
    volumes:
      - mongodb_data:/data/db
    networks:
      - isa-chain-network

  # MCP Server Integration
  mcp-server:
    build:
      context: ./ai-integration/mcp-bridge
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - MCP_PORT=8081
      - BLOCKCHAIN_RPC_URL=http://blockchain-node:8545
    depends_on:
      - blockchain-node
    networks:
      - isa-chain-network

  # Oracle Network
  oracle-node:
    build:
      context: ./oracle
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - ORACLE_PORT=8082
      - BLOCKCHAIN_RPC_URL=http://blockchain-node:8545
      - CHAINLINK_NODE_URL=http://chainlink:6688
    depends_on:
      - blockchain-node
    networks:
      - isa-chain-network

  # Exchange Services
  trading-engine:
    build:
      context: ./exchange/matching-engine
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - ENGINE_PORT=8090
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://isachain:isachain123@postgres:5432/isachain
    depends_on:
      - postgres
      - redis
    networks:
      - isa-chain-network

  # DApp Frontend
  dapp-frontend:
    build:
      context: ./dapp/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RPC_URL=http://localhost:8545
      - NEXT_PUBLIC_WS_URL=ws://localhost:8546
      - NEXT_PUBLIC_MCP_URL=http://localhost:8081
    depends_on:
      - blockchain-node
      - mcp-server
    networks:
      - isa-chain-network

  # Analytics & Monitoring
  blockchain-explorer:
    build:
      context: ./analytics/blockchain-explorer
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - RPC_URL=http://blockchain-node:8545
      - DATABASE_URL=postgresql://isachain:isachain123@postgres:5432/isachain
    depends_on:
      - blockchain-node
      - postgres
    networks:
      - isa-chain-network

  # Metrics & Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - isa-chain-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - isa-chain-network

  # External Service Dependencies
  chainlink:
    image: smartcontract/chainlink:latest
    ports:
      - "6688:6688"
    environment:
      - ROOT=/chainlink
      - LOG_LEVEL=debug
      - ETH_CHAIN_ID=15489
      - ETH_URL=ws://blockchain-node:8546
      - DATABASE_URL=postgresql://isachain:isachain123@postgres:5432/isachain
      - CHAINLINK_TLS_PORT=0
      - SECURE_COOKIES=false
      - ALLOW_ORIGINS=*
    depends_on:
      - postgres
      - blockchain-node
    volumes:
      - chainlink_data:/chainlink
    networks:
      - isa-chain-network

volumes:
  blockchain_data:
  postgres_data:
  redis_data:
  mongodb_data:
  prometheus_data:
  grafana_data:
  chainlink_data:

networks:
  isa-chain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16